# macOS Desktop build pipeline. Scoped only to changes that affect
# the Flutter macOS shell. iOS-Simulator-only changes (e.g.
# native/ios/skal_iossim_shim.c, scripts/link-skal-iossim.sh) do NOT
# trigger this workflow — modularity invariant: per-platform builds
# only relink on inputs that actually flow into them.

name: desktop

on:
  pull_request:
    paths:
      - flutter/skal_flutter/macos/**
      - flutter/skal_flutter/lib/**
      - flutter/skal_flutter/pubspec.yaml
      - flutter/scripts/link-libskal-flutter-mac.sh
      - js-app/**
      - patches/skal_entry.zig
      - patches/bun-base-commit.txt
      - patches/0001-bun-main-android-skal-import.patch
      - patches/0002-bun-tools-find-lld-on-darwin.patch
      - scripts/setup.sh
      - native/ios/skal.h
      - .github/workflows/desktop.yml
  push:
    branches: [main]
    paths:
      - flutter/skal_flutter/macos/**
      - flutter/skal_flutter/lib/**
      - flutter/skal_flutter/pubspec.yaml
      - flutter/scripts/link-libskal-flutter-mac.sh
      - js-app/**
      - patches/**
      - scripts/setup.sh
      - native/ios/skal.h
      - .github/workflows/desktop.yml
  workflow_call:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: rustup install nightly && rustup default nightly
      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.bun/build-cache
          key: desktop-vendor-${{ hashFiles('patches/bun-base-commit.txt', 'patches/webkit-base-commit.txt', 'patches/0*.patch', 'patches/skal_entry.zig') }}

      - name: Bootstrap (clone + apply patches + copy skal_entry.zig)
        run: scripts/setup.sh

      - name: Build vendored bun for host (release)
        working-directory: vendor/bun
        run: PATH="$HOME/.cargo/bin:$PATH" bun run build:release

      - name: Re-link libskal.dylib for Flutter macOS
        run: flutter/scripts/link-libskal-flutter-mac.sh

      - name: Build skal-app.{js,cjs,cjs.jsc}
        working-directory: js-app
        run: |
          bun install
          bun run build

      - name: flutter build macos --release
        working-directory: flutter/skal_flutter
        run: flutter build macos --release

      # Headless smoke: launches the .app for 10 s, asserts the
      # `[skal] init=…` line appears in stdout. Catches the silent-eval
      # regression (the UTF-8-encoding-bug class of bug) where the JS
      # bundle "loads" but no ops ever reach the bridge.
      - name: Smoke run (10 s)
        run: |
          APP=flutter/skal_flutter/build/macos/Build/Products/Release/skal_flutter.app
          "$APP/Contents/MacOS/skal_flutter" > /tmp/smoke.log 2>&1 &
          SMOKE_PID=$!
          sleep 10
          kill "$SMOKE_PID" 2>/dev/null || true
          if grep -q "\[skal\] init=" /tmp/smoke.log; then
            echo "✓ smoke passed"
            grep "\[skal\]" /tmp/smoke.log
          else
            echo "✗ no [skal] init line — Desktop demo never started"
            tail -50 /tmp/smoke.log
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-flutter
          path: |
            flutter/skal_flutter/build/macos/Build/Products/Release/skal_flutter.app
            build/skal-darwin/libskal.unstripped.dylib
