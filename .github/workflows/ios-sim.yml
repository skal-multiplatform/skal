# iOS Simulator build pipeline. Independent of desktop.yml even though
# both produce a macOS-built libskal.dylib — the iOS-Sim variant is the
# same .o files re-stamped with `vtool` to LC_BUILD_VERSION=IOSSIMULATOR
# plus a small shim (packages/skal_native/ios/skal_iossim_shim.c) that provides the
# __clear_cache symbol iOS Simulator's libSystem doesn't export.
#
# iOS Device (aarch64-apple-ios) is intentionally not in CI — it
# requires a real Apple Developer signing identity. The device dylib
# is built locally via scripts/link-skal-ios.sh.

name: ios-sim

on:
  pull_request:
    paths:
      - examples/kitchen-sink/flutter-host/ios/**
      - packages/skal_flutter/lib/**
      - packages/skal_flutter/pubspec.yaml
      - packages/skal-js/**
      - examples/kitchen-sink/src/**
      - examples/kitchen-sink/package.json
      - patches/skal_entry.zig
      - patches/bun-skal-commit.txt
      - patches/webkit-skal-commit.txt
      - scripts/setup.sh
      - scripts/link-skal-iossim.sh
      - packages/skal_native/**
      - .github/workflows/ios-sim.yml
  push:
    branches: [main]
    paths:
      - examples/kitchen-sink/flutter-host/ios/**
      - packages/skal_flutter/lib/**
      - packages/skal_flutter/pubspec.yaml
      - packages/skal-js/**
      - examples/kitchen-sink/src/**
      - examples/kitchen-sink/package.json
      - patches/**
      - scripts/setup.sh
      - scripts/link-skal-iossim.sh
      - packages/skal_native/**
      - .github/workflows/ios-sim.yml
  workflow_call:
  workflow_dispatch: {}

concurrency:
  group: ios-sim-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          # SDK cache only. The pub-dependency cache's save key runs
          # hashFiles('**/pubspec.lock') over the whole workspace at
          # post-job time — with the multi-GB vendor/ cache restored it
          # blows the 120s template limit and reds an otherwise-green job.
          pub-cache: false
      - run: rustup install nightly && rustup default nightly
      - uses: oven-sh/setup-bun@v2

      # bun's build needs LLVM 21 (clang) + ninja. cargo's lolhtml link
      # uses bare `-fuse-ld=lld`, resolved via PATH — Homebrew's llvm@21
      # is keg-only, so expose ld.lld on PATH explicitly.
      - name: Install LLVM 21 toolchain
        run: |
          brew install llvm@21 lld@21 ninja || true
          test -x "$(brew --prefix llvm@21)/bin/clang"
          # ld.lld ships in the lld@21 formula (newer bottles) or inside the llvm@21 keg (older).
          LLD="$(brew --prefix lld@21 2>/dev/null || true)/bin/ld.lld"
          [[ -x "$LLD" ]] || LLD="$(brew --prefix llvm@21)/bin/ld.lld"
          ln -sf "$LLD" /opt/homebrew/bin/ld.lld
          /opt/homebrew/bin/ld.lld --version

      - uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.bun/build-cache
          key: ios-sim-vendor-${{ hashFiles('patches/bun-skal-commit.txt', 'patches/webkit-skal-commit.txt', 'patches/skal_entry.zig') }}
          # Prefix fallback: a pin bump restores the previous vendor/ and
          # setup.sh reconciles it to the new pin (fetch + checkout).
          restore-keys: |
            ios-sim-vendor-

      - name: Bootstrap (clone skal forks + copy skal_entry.zig)
        run: scripts/setup.sh
        env:
          SKAL_BOOTSTRAP_ONLY: "1"

      - name: Build vendored bun for host (release)
        working-directory: vendor/bun
        run: PATH="$HOME/.cargo/bin:$PATH" bun run build:release

      - name: Link libskal.dylib (iOS Simulator)
        run: scripts/link-skal-iossim.sh

      - name: Place dylib in Flutter Frameworks/iphonesimulator/
        run: |
          mkdir -p examples/kitchen-sink/flutter-host/ios/Frameworks/iphonesimulator
          cp build/skal-iossim/libskal.dylib \
             examples/kitchen-sink/flutter-host/ios/Frameworks/iphonesimulator/libskal.dylib

      # Workspace deps land at the repo root (bun workspaces); the
      # bytecode pass locks onto the vendored bun via the app's
      # scripts/find-vendored-bun.sh.
      - name: Build skal-app.{js,cjs,cjs.jsc}
        working-directory: examples/kitchen-sink
        run: bun run build

      - name: flutter build ios --simulator --debug
        working-directory: examples/kitchen-sink/flutter-host
        run: flutter build ios --simulator --debug

      # Boot a sim, install, launch, screenshot — full end-to-end
      # verification. The screenshot is uploaded as an artifact so a
      # reviewer can visually confirm "Solid demo still renders".
      - name: Boot iPhone simulator
        run: |
          # Runner images rotate device/runtime versions — never hardcode a
          # model. Prefer any pre-provisioned iPhone; else create one from
          # the newest iOS runtime on the image.
          DEVICE_ID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices | to_entries[]
                      | select(.key | contains("SimRuntime.iOS"))
                      | .value[]
                      | select(.isAvailable and (.name | startswith("iPhone")))][0].udid // empty')
          if [[ -z "$DEVICE_ID" ]]; then
            RUNTIME=$(xcrun simctl list runtimes --json \
              | jq -r '[.runtimes[] | select(.platform == "iOS" and .isAvailable)]
                       | sort_by(.version | split(".") | map(tonumber)) | last | .identifier')
            DEVICE_TYPE=$(xcrun simctl list devicetypes --json \
              | jq -r '[.devicetypes[] | select(.name | startswith("iPhone"))] | first | .identifier')
            DEVICE_ID=$(xcrun simctl create "skal-ci" "$DEVICE_TYPE" "$RUNTIME")
          fi
          echo "using simulator $DEVICE_ID"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Install + launch + screenshot
        run: |
          xcrun simctl install "$DEVICE_ID" \
            examples/kitchen-sink/flutter-host/build/ios/iphonesimulator/Runner.app
          xcrun simctl launch "$DEVICE_ID" com.skal.skalFlutter > /tmp/launch.log
          sleep 8
          xcrun simctl io "$DEVICE_ID" screenshot smoke.png
          # Asserts the app didn't crash on launch. simctl spawn launchctl
          # list shows everything currently running on the sim.
          xcrun simctl spawn "$DEVICE_ID" launchctl list | grep -q com.skal.skalFlutter

      - uses: actions/upload-artifact@v4
        with:
          name: ios-sim-smoke
          path: |
            smoke.png
            build/skal-iossim/libskal.unstripped.dylib
