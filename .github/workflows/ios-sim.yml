# iOS Simulator build pipeline. Independent of desktop.yml per the
# modularity refactor (TODO_PLATFORMS § 0.5/V1) — Desktop's
# libskal.dylib is JNI-only, iOS Sim's is C-only, scripts and exports
# don't share fate.
#
# iOS Device (aarch64-apple-ios) is a separate workflow — Phase 2-Device
# in docs/ios-port.md. This file covers only the Simulator path that's
# already shipping.

name: ios-sim

on:
  pull_request:
    paths:
      - shared/**
      - ios-app/**
      - vendor/bun/**
      - patches/skal_entry.zig
      - patches/0001-bun-main-android-skal-import.patch
      - scripts/link-skal-dylib.sh    # shim source compiled here
      - scripts/link-skal-iossim.sh
      - native/ios/**
      - js-app/**
      - .github/workflows/ios-sim.yml
  push:
    branches: [main]
    paths:
      - shared/**
      - ios-app/**
      - vendor/bun/**
      - patches/**
      - scripts/link-skal-iossim.sh
      - scripts/link-skal-dylib.sh
      - native/ios/**
      - js-app/**
      - .github/workflows/ios-sim.yml

concurrency:
  group: ios-sim-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: rustup install nightly && rustup default nightly
      - run: brew install xcodegen

      - uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.bun/build-cache
            ~/.konan
          key: ios-sim-vendor-${{ hashFiles('patches/bun-base-commit.txt', 'patches/webkit-base-commit.txt') }}

      - name: Bootstrap
        run: scripts/setup.sh

      - name: Build vendored bun (release)
        working-directory: vendor/bun
        run: PATH="$HOME/.cargo/bin:$PATH" bun run build:release

      - name: Link libskal.dylib (iOS Simulator)
        run: scripts/link-skal-iossim.sh

      - name: Build Skal.framework (iosSimulatorArm64)
        working-directory: ios-app
        run: ./gradlew linkDebugFrameworkIosSimulatorArm64

      - name: Generate Xcode project
        working-directory: ios-app/iosApp
        run: xcodegen generate

      - name: Build SkalIosApp.app
        working-directory: ios-app/iosApp
        run: |
          xcodebuild \
            -project SkalIosApp.xcodeproj \
            -scheme SkalIosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            build CODE_SIGNING_ALLOWED=NO

      # Boot a sim, install, launch, screenshot — full end-to-end
      # verification. The screenshot is uploaded as an artifact so a
      # PR can visually confirm "Solid demo still renders".
      - name: Boot iPhone 15 Pro Max simulator
        run: |
          DEVICE_ID=$(xcrun simctl create "skal-ci" "iPhone 15 Pro Max" "com.apple.CoreSimulator.SimRuntime.iOS-18-0" 2>/dev/null || \
                     xcrun simctl list devices | grep "iPhone 15 Pro Max" | head -1 | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE_ID" || true

      - name: Install + launch + screenshot
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "SkalIosApp.app" -type d | head -1)
          xcrun simctl install "$DEVICE_ID" "$APP"
          xcrun simctl launch "$DEVICE_ID" com.skal.ios.demo
          sleep 8
          xcrun simctl io "$DEVICE_ID" screenshot smoke.png
          # Asserts the app didn't crash on launch — its process must
          # still be alive 8s after launch. simctl launch returns the
          # PID; we check it's still listed.
          xcrun simctl spawn "$DEVICE_ID" launchctl list | grep -q com.skal.ios.demo

      - uses: actions/upload-artifact@v4
        with:
          name: ios-sim-smoke
          path: |
            smoke.png
            build/skal-iossim/libskal.unstripped.dylib
