# Multiplatform compile check for the shared/ KMP module.
#
# Fast signal that the bridge code (commonMain) and the per-platform
# actuals (jvmMain + iosMain) all type-check before the per-platform
# jobs spin up their longer build pipelines. Per TODO_PLATFORMS
# § 0.5 modularity invariants — this is the "fast lane" check; the
# heavier per-platform workflows depend on shared/ but only run on
# their own paths.

name: shared

on:
  pull_request:
    paths:
      - shared/**
      - .github/workflows/shared.yml
  push:
    branches: [main]
    paths:
      - shared/**
      - .github/workflows/shared.yml

concurrency:
  group: shared-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: macos-15  # arm64 runner — required for Kotlin/Native iOS targets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4

      # commonMain compile — fast (no native), catches expect/actual
      # mismatches and SkalBridge.kt type errors before per-platform
      # jobs build their full pipelines.
      - name: shared :compileKotlinJvm
        working-directory: shared
        run: ./gradlew compileKotlinJvm

      # iOS Sim compile — exercises the cinterop bindings + iosMain
      # actuals against shared's commonMain expects. ~2 min on the
      # cold cache; ~30s warm (Konan deps cached).
      - name: shared :compileKotlinIosSimulatorArm64
        working-directory: shared
        run: ./gradlew compileKotlinIosSimulatorArm64
