name: kitchen_sink
description: >-
  Skal kitchen-sink demo — host app. Exercises every fast-path widget,
  the design system, dialogs, the store, custom widgets (codegen + host
  pattern), navigation, JS-side probes, and the render bench.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # package:web — modern DOM bindings (replaces deprecated dart:html).
  # Used by main_web.dart's HtmlElementView factory wiring to take
  # the JS-built DOM element returned by __skalCreateHtmlViewElement
  # and hand it back to Flutter Web as an HTMLElement type. Pure
  # type interop, no runtime cost.
  web: ^1.1.0

  # The Skal framework — pulled in as a local workspace package. All
  # `package:skal_flutter/...` imports below resolve here, including
  # the framework `lib/skal/*` files and skal_ffi.
  skal_flutter:
    path: ../../../packages/skal_flutter

  # path_provider — Flutter wrapper around platform-specific dirs.
  # Needed because bun's module loader takes file:// URLs, not APK
  # assets/ paths. We extract the bytecode .cjs + .cjs.jsc pair out
  # of the APK ZIP into the app's getApplicationSupportDirectory()
  # on first launch, then point `await import(...)` at the extracted
  # file. From there the @bytecode marker in the .cjs header triggers
  # bun to load the sibling .jsc, attach it to JSC's SourceProvider,
  # and skip the parser.
  path_provider: ^2.1.4

  # qr_flutter — third-party QR-code rendering widget. Wrapped via
  # skal_codegen as a real-package smoke test of the custom-widget
  # path: install the package, point codegen at its QrImageView
  # source, get a registry adapter, use <QrImageView> from JSX.
  qr_flutter: ^4.1.0

  # shimmer — third-party "shimmering loading placeholder" widget.
  # Second smoke-test target for the codegen: validates the
  # Widget-child encoding (Shimmer takes `child: Widget`), the
  # Color encoding (base + highlight), and the Duration encoding
  # (period). Together those types span every supported value
  # category we've added in this branch.
  shimmer: ^3.0.0

  # camera — first stateful widget wrapped via codegen's HOST
  # pattern. CameraPreview takes a CameraController (stateful, async-
  # initialized, plugin-channel backed) which can't be encoded over
  # the bridge directly. The host pattern declares a factory function
  # the codegen wraps in a synthesized StatefulWidget that owns the
  # controller's lifecycle. See lib/skal_codegen.yaml hosts: section.
  camera: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # build_runner — standard Dart code-gen runner. `dart run build_runner
  # build` triggers skal_codegen (and any other registered builders).
  build_runner: ^2.4.0

  # skal_codegen — local path dep until published. Registers a Builder
  # that reads `lib/skal_codegen.yaml` (the marker file) and emits a
  # combined adapter at `lib/skal_codegen.g.dart`. See
  # packages/skal_codegen/lib/builder.dart for the consumer workflow.
  skal_codegen:
    path: ../../../packages/skal_codegen

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Skal's JS bundle — produced by
  # `cd ../.. && bun run build` (i.e., from `examples/kitchen-sink/`),
  # which outputs directly into this directory (see
  # examples/kitchen-sink/vite.config.js and
  # examples/kitchen-sink/package.json build:bytecode).
  #
  # Three artifacts:
  #   skal-app.js       — raw IIFE bundle, eval'd directly via
  #                       skal_evaluate (debug builds, slow path)
  #   skal-app.cjs      — CJS wrapper with `// @bun @bytecode @bun-cjs`
  #                       marker; release path loads this and bun
  #                       finds the sibling .jsc
  #   skal-app.cjs.jsc  — pre-compiled JSC bytecode; opaque, must sit
  #                       next to the .cjs on a real filesystem path
  #                       (NOT readable from APK assets directly)
  assets:
    - assets/skal-app.js
    - assets/skal-app.cjs
    - assets/skal-app.cjs.jsc
