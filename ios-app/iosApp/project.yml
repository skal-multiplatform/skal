# XcodeGen spec for the iOS host app that embeds Skal.framework.
#
# Regenerate the .xcodeproj from this file: `xcodegen generate`
# (run from this directory). Don't hand-edit project.pbxproj — its
# UUIDs change on every regeneration.
#
# This is intentionally a minimal shell. The "interesting" code lives
# in ../src/iosMain/kotlin/com/skal/ios/Main.kt (the Kotlin entry
# point) and the bun runtime work captured in docs/ios-port.md.

name: SkalIosApp
options:
  bundleIdPrefix: com.skal
  deploymentTarget:
    iOS: 16.0
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    # DEVELOPMENT_TEAM is empty by default — Simulator builds don't need
    # it (`xcrun simctl install` ignores signature). For real-device
    # builds, set the env var SKAL_DEVELOPMENT_TEAM before `xcodegen
    # generate`, OR replace the empty string here with your 10-char team
    # ID. Free Apple IDs get a "personal team" with a team ID you can
    # find in Xcode → Settings → Accounts → Apple IDs → Manage
    # Certificates. The same project.yml supports both signed (device)
    # and unsigned (Simulator) builds via the per-SDK conditioning below.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Per-SDK code signing: Simulator builds are unsigned (`xcrun simctl
    # install` doesn't care), device builds use automatic signing (Xcode
    # picks the dev provisioning profile matched to DEVELOPMENT_TEAM).
    # The `[sdk=...]` bracket syntax is an Xcode build-setting feature
    # that XcodeGen passes through verbatim into project.pbxproj.
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": NO
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO
    "CODE_SIGNING_REQUIRED[sdk=iphoneos*]": YES
    "CODE_SIGNING_ALLOWED[sdk=iphoneos*]": YES
    "CODE_SIGN_IDENTITY[sdk=iphoneos*]": Apple Development
    # Skal.framework is built by the parent gradle module. We pick the
    # framework variant by SDK: Simulator → iosSimulatorArm64, device
    # → iosArm64. Both targets are produced by the same gradle build
    # (the Kotlin/Native compiler emits one .framework per target).
    #
    # The `$(SKAL_KOTLIN_VARIANT)` substitution flips between
    # debugFramework/ (45.9 MB, full klib + symbols) and releaseFramework/
    # (25.8 MB, R8-equivalent dead-strip) based on the active Xcode build
    # configuration. Without it, Release builds picked up the debug
    # framework regardless — making release-mode size + perf claims
    # aspirational rather than real. The mapping Debug → debug, Release →
    # release is set under settings.configs below; XcodeGen doesn't
    # provide a built-in `CONFIGURATION_LOWER`, so we define our own.
    "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]":
      - $(inherited)
      - $(SRCROOT)/../build/bin/iosSimulatorArm64/$(SKAL_KOTLIN_VARIANT)Framework
    "FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]":
      - $(inherited)
      - $(SRCROOT)/../build/bin/iosArm64/$(SKAL_KOTLIN_VARIANT)Framework
  # Per-configuration overrides — see FRAMEWORK_SEARCH_PATHS comment.
  # The variable name is local to this project (Xcode build settings live
  # in a flat namespace per target; nothing else in our build references
  # SKAL_KOTLIN_VARIANT, so the choice is arbitrary as long as it doesn't
  # collide with an Xcode-built-in or Kotlin/Native-emitted setting).
  configs:
    Debug:
      SKAL_KOTLIN_VARIANT: debug
    Release:
      SKAL_KOTLIN_VARIANT: release

targets:
  SkalIosApp:
    type: application
    platform: iOS
    deploymentTarget: 16.0
    sources:
      - path: SkalIosApp
        # XcodeGen scans the folder and auto-categorizes each file by
        # extension into the right Xcode build phase: Swift → Sources,
        # .plist → Resources, .xcassets → Resources, etc. The bytecode
        # pair (.cjs + .cjs.jsc) lands in Resources via the fileGroups
        # entry below — Xcode copies them into the .app's root so
        # NSBundle.pathForResource("skal-app", "cjs") finds them.
        # Without the bytecode at runtime, iOS Main.kt falls back to
        # source eval and we lose the parse-free cold-start win
        # (~500-700 ms on iOS where JIT is disabled — the only
        # meaningful perf knob iOS offers).
        #
        # Earlier this entry had `type: folder.assetcatalog` — a
        # misnomer that was silently ignored by XcodeGen (paths
        # pointing at directories override that hint), but it stayed
        # because dropping it didn't change the generated pbxproj.
        # Removed now to avoid future readers thinking SkalIosApp/ is
        # one giant .xcassets blob.
    # NB: explicitly list the bytecode pair as resources so Xcode
    # copies them into the .app's Resources/ rather than treating
    # the unknown extensions as "ignore".
    fileGroups:
      - SkalIosApp/skal-app.cjs
      - SkalIosApp/skal-app.cjs.jsc
    info:
      path: SkalIosApp/Info.plist
      properties:
        # Compose Multiplatform iOS requires this — without it, the
        # PlistSanityCheck in androidx.compose.ui.uikit aborts with
        # "inadequate performance on iPhones with high refresh rate."
        # The key opts the app out of iOS's default 60Hz frame cap on
        # ProMotion displays so Compose can drive at 120Hz.
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Skal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skal.ios.demo
        INFOPLIST_FILE: SkalIosApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # The app loads libskal.dylib via dyld at startup (Skal.framework
        # has LC_LOAD_DYLIB → @rpath/libskal.dylib). LD_RUNPATH_SEARCH_PATHS
        # = @executable_path/Frameworks teaches dyld where @rpath
        # resolves; the embedded dylib goes in SkalIosApp.app/Frameworks/
        # via the copyFiles phase below.
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
        # libskal.dylib is referenced via @rpath at runtime; Xcode's
        # link step doesn't need to see it (Skal.framework's Mach-O
        # already declares the LC_LOAD_DYLIB record). But Xcode does
        # need to know NOT to strip the dylib from the bundle, hence
        # the copyFiles phase below.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      # Register Skal.framework for the project nav + link step. We
      # point at the Simulator path here only because XcodeGen needs a
      # concrete file at generation time (PBXFileRef paths are stored
      # verbatim — Xcode build-setting variables like `$(SDK_NAME)`
      # don't expand inside PBXFileRef.path). The actual linking
      # resolves the framework by NAME via FRAMEWORK_SEARCH_PATHS,
      # which IS SDK-conditional (see settings.base above) — so
      # linking against this dep on an `iphoneos` build correctly
      # finds the iosArm64 framework, not the Simulator one.
      #
      # `embed: false` because embedding via PBXFileRef would always
      # copy the literal Simulator path. The postBuildScripts below
      # handles the per-SDK framework copy + libskal.dylib placement.
      #
      # The `$(SKAL_KOTLIN_VARIANT)` substitution still flips
      # debugFramework/ vs releaseFramework/ at Xcode build time
      # (Debug → debug, Release → release; see settings.configs above).
      - framework: ../build/bin/iosSimulatorArm64/$(SKAL_KOTLIN_VARIANT)Framework/Skal.framework
        embed: false
        codeSign: false
    # Copy Skal.framework and libskal.dylib into SkalIosApp.app/Frameworks/.
    # We do this via post-build Run Scripts (rather than XcodeGen's
    # copyFiles or `embed: true` on the framework dep) because:
    #   1. The artifacts live outside the app's source tree (built by
    #      `./gradlew :linkReleaseFrameworkIosArm64` and
    #      `scripts/link-skal-ios.sh` respectively).
    #   2. The right artifact depends on the active SDK (Sim vs device),
    #      and PBXFileRef paths can't be SDK-conditional — but a shell
    #      script can branch on `$PLATFORM_NAME` at build time.
    postBuildScripts:
      - name: Embed Skal.framework
        shell: /bin/bash
        runOnlyWhenInstalling: false
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(FRAMEWORKS_FOLDER_PATH)/Skal.framework/Skal
        script: |
          set -euo pipefail
          # Pick the Kotlin/Native target matching the Xcode SDK.
          # Same build, two outputs (iosSimulatorArm64/ and iosArm64/)
          # produced by ./gradlew linkXxxFrameworkIosXxx.
          if [[ "${PLATFORM_NAME}" == "iphoneos" ]]; then
            kt_target="iosArm64"
          else
            kt_target="iosSimulatorArm64"
          fi
          # SRCROOT is .../ios-app/iosApp; ../build/ → ios-app/build/
          # (Kotlin/Native framework outputs live here, NOT at the
          # Skal root's build/. libskal.dylib does live at the root —
          # see the next script.)
          src="${SRCROOT}/../build/bin/${kt_target}/${SKAL_KOTLIN_VARIANT}Framework/Skal.framework"
          dst="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/Skal.framework"
          if [[ ! -d "$src" ]]; then
            # Capitalize first letter portably (macOS /bin/bash is 3.2,
            # which doesn't support the `${VAR^}` shorthand).
            variant_cap="$(echo "${SKAL_KOTLIN_VARIANT}" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
            target_cap="$(echo "${kt_target}" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"
            echo "error: $src not found — run \`./gradlew :link${variant_cap}Framework${target_cap}\` (e.g. linkDebugFrameworkIosArm64)" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$dst")"
          rm -rf "$dst"
          cp -R "$src" "$dst"
          echo "✓ embedded Skal.framework from ${kt_target}/${SKAL_KOTLIN_VARIANT}Framework/"
      - name: Embed libskal.dylib
        shell: /bin/bash
        runOnlyWhenInstalling: false
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libskal.dylib
        script: |
          set -euo pipefail
          # Pick the libskal build dir matching the Xcode SDK.
          # Simulator → build/skal-iossim/ (built by scripts/link-skal-iossim.sh)
          # Device   → build/skal-ios-device/ (built by scripts/link-skal-ios.sh)
          if [[ "${PLATFORM_NAME}" == "iphoneos" ]]; then
            src="${SRCROOT}/../../build/skal-ios-device/libskal.dylib"
            origin_script="scripts/link-skal-ios.sh"
          else
            src="${SRCROOT}/../../build/skal-iossim/libskal.dylib"
            origin_script="scripts/link-skal-iossim.sh"
          fi
          dst="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/libskal.dylib"
          if [[ ! -f "$src" ]]; then
            echo "error: $src not found — run \`bash $origin_script\` from Skal root" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$dst")"
          cp "$src" "$dst"
          echo "✓ embedded $(stat -f '%z' "$src") bytes from $src"
