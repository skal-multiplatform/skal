name: skal_flutter
description: >-
  Skal — Dart/Flutter half of the framework. Bridge, registry, root,
  dialogs, FFI bindings. Pair this with the JS-side `skal` package.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # ffi provides `calloc` (libc malloc-backed allocator) for short-lived
  # native buffers we use as out-params with skal_evaluate.
  ffi: ^2.1.3

  # path_provider — used by skal/dialogs.dart to resolve the data dir
  # for the showFilePicker / showSaveDialog primitives. Apps consuming
  # the framework get this transitively.
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Default Flutter lints — the example app picks its own analysis
  # config independently.
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
