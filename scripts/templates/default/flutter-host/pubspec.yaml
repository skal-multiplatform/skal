name: __APP_NAME_SNAKE__
description: A Skal app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # The Skal framework — pulled in as a workspace package via path.
  skal_flutter:
    path: ../../../packages/skal_flutter

  # path_provider — extracts the bytecode .cjs + .cjs.jsc pair out
  # of the bundle into the app's getApplicationSupportDirectory() so
  # bun's module loader can read them from a real filesystem path.
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # The JS bundle — produced in the parent dir. skal-app.js is REQUIRED:
  # listing it explicitly keeps `flutter build` failing loudly if the
  # bundle was never built, instead of silently shipping a black screen.
  # The bytecode artifacts (skal-app.cjs / .cjs.jsc) are OPTIONAL — they
  # only exist after a full `bun run build`; the hot-reload / js-only path
  # emits just the .js. So they ride the `assets/` directory (present →
  # bundled, absent → no error) rather than an explicit entry, which is
  # what previously made `dev:hot:*` fail the build on the missing bytecode.
  assets:
    - assets/skal-app.js
    - assets/
